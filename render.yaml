services:
  - type: web
    name: styleai-app
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: node dist/index.cjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false   # fill in on Render dashboard
      - key: DATABASE_URL
        sync: false   # fill in from Supabase dashboard
